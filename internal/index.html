<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creata Ventures — Startup Engagement Models</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState, useEffect } = React;

// ============================================
// DESIGN SYSTEM — Creata Ventures Branding
// ============================================

const C = {
    dark: '#0a0a0a',
    darkCard: '#141414',
    primary: '#23f5af',
    accent: '#f97316',
    secondary: '#6366f1',
    deepGreen: '#0d3320',
    light: '#fafafa',
    text: '#1d1d1f',
    muted: '#86868b',
    white: '#ffffff',
    border: 'rgba(255,255,255,0.1)',
    success: '#22c55e',
    warning: '#eab308',
    danger: '#ef4444'
};

const F = {
    heading: "'Unbounded', sans-serif",
    body: "'Manrope', sans-serif"
};

// Icons
const ChevronLeft = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
);
const ChevronRight = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="9 18 15 12 9 6"></polyline>
    </svg>
);
const Rocket = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path>
    </svg>
);
const Users = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
    </svg>
);
const Target = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle>
    </svg>
);
const TrendingUp = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
        <polyline points="17 6 23 6 23 12"></polyline>
    </svg>
);
const DollarSign = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
    </svg>
);
const Briefcase = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
    </svg>
);
const Building = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
        <path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path>
        <path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path>
        <path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path>
    </svg>
);
const Layers = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
    </svg>
);
const ArrowRight = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="5" y1="12" x2="19" y2="12"></line>
        <polyline points="12 5 19 12 12 19"></polyline>
    </svg>
);
const Check = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
);
const Globe = ({ style }) => (
    <svg style={style} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="2" y1="12" x2="22" y2="12"></line>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
    </svg>
);

// Logo component
const Logo = ({ size = 48 }) => (
    <div style={{
        width: size, height: size, borderRadius: size / 4,
        background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`,
        display: 'flex', alignItems: 'center', justifyContent: 'center'
    }}>
        <span style={{ fontSize: size * 0.35, fontWeight: 700, fontFamily: F.heading, color: C.dark }}>CV</span>
    </div>
);

// Base Slide
const Slide = ({ children, dark = true }) => (
    <div style={{
        width: '100%', height: '100%',
        background: dark ? C.dark : C.light,
        color: dark ? C.white : C.text,
        padding: '48px 80px',
        display: 'flex', flexDirection: 'column',
        fontFamily: F.body, overflow: 'hidden'
    }}>
        <div style={{ width: '100%', maxWidth: 1200, margin: '0 auto', height: '100%', display: 'flex', flexDirection: 'column' }}>
            {children}
        </div>
    </div>
);

// Section Label
const SectionLabel = ({ children, number }) => (
    <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
        {number && (
            <span style={{
                fontSize: 64, fontWeight: 700, fontFamily: F.heading,
                background: `linear-gradient(135deg, ${C.primary}, ${C.secondary})`,
                WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                lineHeight: 1, opacity: 0.9
            }}>{number}</span>
        )}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: C.primary, fontFamily: F.heading, textTransform: 'uppercase', letterSpacing: 3 }}>{children}</span>
            <div style={{ width: 60, height: 3, borderRadius: 2, background: `linear-gradient(90deg, ${C.primary}, transparent)` }} />
        </div>
    </div>
);

// Slide Title
const SlideTitle = ({ children, size = 'large' }) => {
    const sizes = { large: 48, medium: 40, small: 32 };
    return (
        <h2 style={{
            fontSize: sizes[size], fontWeight: 700, fontFamily: F.heading, letterSpacing: '-0.03em', lineHeight: 1.1,
            margin: 0, marginBottom: 20,
            background: `linear-gradient(135deg, ${C.white} 0%, rgba(255,255,255,0.7) 100%)`,
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
        }}>{children}</h2>
    );
};

// Stat Card
const StatCard = ({ value, label, icon: Icon, highlight = false }) => (
    <div style={{
        background: highlight ? `linear-gradient(135deg, ${C.primary}15, ${C.secondary}15)` : C.darkCard,
        border: `1px solid ${highlight ? C.primary + '30' : C.border}`,
        borderRadius: 16, padding: 24, textAlign: 'center'
    }}>
        {Icon && <div style={{ marginBottom: 12 }}><Icon style={{ width: 28, height: 28, color: highlight ? C.primary : C.muted }} /></div>}
        <div style={{ fontSize: 36, fontWeight: 700, fontFamily: F.heading, color: highlight ? C.primary : C.white, marginBottom: 4 }}>{value}</div>
        <div style={{ fontSize: 13, color: C.muted }}>{label}</div>
    </div>
);

// Type Card (custom for this deck)
const TypeCard = ({ number, name, tagline, equity, effort, risk, returnLevel, cash, color = C.primary, items = [] }) => {
    const bars = (n) => '■'.repeat(n) + '□'.repeat(5 - n);
    return (
        <div style={{
            background: C.darkCard, border: `1px solid ${C.border}`, borderRadius: 16,
            padding: 24, borderTop: `4px solid ${color}`, height: '100%', display: 'flex', flexDirection: 'column'
        }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                <span style={{ fontSize: 32, fontWeight: 700, fontFamily: F.heading, color: color, opacity: 0.5 }}>{number}</span>
                <div>
                    <div style={{ fontSize: 18, fontWeight: 600, fontFamily: F.heading, color: C.white }}>{name}</div>
                    <div style={{ fontSize: 12, color: C.muted }}>{tagline}</div>
                </div>
            </div>
            <div style={{
                display: 'inline-block', background: color + '25', color: color,
                padding: '4px 14px', borderRadius: 20, fontSize: 14, fontWeight: 600, marginBottom: 16, alignSelf: 'flex-start'
            }}>{equity}</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, flex: 1 }}>
                {items.map((item, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ width: 5, height: 5, borderRadius: '50%', background: color, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.7)' }}>{item}</span>
                    </div>
                ))}
            </div>
            <div style={{ marginTop: 16, fontSize: 11, color: C.muted, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
                <span>Effort: <span style={{ color: color, letterSpacing: 1 }}>{bars(effort)}</span></span>
                <span>Risk: <span style={{ color: C.accent, letterSpacing: 1 }}>{bars(risk)}</span></span>
                <span>Return: <span style={{ color: C.primary, letterSpacing: 1 }}>{bars(returnLevel)}</span></span>
                <span>Cash: <span style={{ color: C.success, letterSpacing: 1 }}>{bars(cash)}</span></span>
            </div>
        </div>
    );
};

// Feature Card
const FeatureCard = ({ title, description, items, icon: Icon }) => (
    <div style={{ background: C.darkCard, border: `1px solid ${C.border}`, borderRadius: 16, padding: 28, height: '100%' }}>
        <div style={{
            width: 48, height: 48, borderRadius: 12,
            background: `linear-gradient(135deg, ${C.primary}20, ${C.secondary}20)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16
        }}>
            <Icon style={{ width: 24, height: 24, color: C.primary }} />
        </div>
        <h3 style={{ fontSize: 20, fontWeight: 600, fontFamily: F.heading, marginBottom: 12, color: C.white }}>{title}</h3>
        <p style={{ fontSize: 14, color: C.muted, lineHeight: 1.6, marginBottom: items ? 16 : 0 }}>{description}</p>
        {items && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {items.map((item, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <div style={{ width: 6, height: 6, borderRadius: '50%', background: C.accent, flexShrink: 0 }} />
                        <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.7)' }}>{item}</span>
                    </div>
                ))}
            </div>
        )}
    </div>
);

// Table component
const DataTable = ({ headers, rows, compact = false }) => (
    <div style={{ width: '100%', overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: compact ? 13 : 15 }}>
            <thead>
                <tr>
                    {headers.map((h, i) => (
                        <th key={i} style={{
                            padding: compact ? '8px 12px' : '12px 16px', textAlign: 'left',
                            borderBottom: `2px solid ${C.primary}30`,
                            color: C.primary, fontFamily: F.heading, fontSize: compact ? 11 : 13,
                            fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1
                        }}>{h}</th>
                    ))}
                </tr>
            </thead>
            <tbody>
                {rows.map((row, i) => (
                    <tr key={i} style={{ background: i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)' }}>
                        {row.map((cell, j) => (
                            <td key={j} style={{
                                padding: compact ? '6px 12px' : '10px 16px',
                                borderBottom: `1px solid ${C.border}`,
                                color: j === 0 ? C.white : 'rgba(255,255,255,0.7)',
                                fontWeight: j === 0 ? 600 : 400
                            }}>{cell}</td>
                        ))}
                    </tr>
                ))}
            </tbody>
        </table>
    </div>
);

// Phase Timeline
const PhaseCard = ({ phase, title, duration, items, active = false }) => (
    <div style={{
        background: active ? `linear-gradient(135deg, ${C.primary}10, ${C.secondary}10)` : C.darkCard,
        border: `1px solid ${active ? C.primary + '40' : C.border}`,
        borderRadius: 16, padding: 24, position: 'relative', height: '100%'
    }}>
        <div style={{
            position: 'absolute', top: -12, left: 20,
            background: active ? C.primary : C.muted,
            color: active ? C.dark : C.white,
            fontSize: 11, fontWeight: 600, padding: '4px 14px', borderRadius: 20
        }}>{phase}</div>
        <h4 style={{ fontSize: 18, fontWeight: 600, fontFamily: F.heading, marginTop: 8, marginBottom: 4, color: active ? C.primary : C.white }}>{title}</h4>
        <p style={{ fontSize: 12, color: C.muted, marginBottom: 16 }}>{duration}</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map((item, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 8 }}>
                    <Check style={{ width: 14, height: 14, color: C.primary, flexShrink: 0, marginTop: 2 }} />
                    <span style={{ fontSize: 13, color: 'rgba(255,255,255,0.7)' }}>{item}</span>
                </div>
            ))}
        </div>
    </div>
);

// ============================================
// SLIDES
// ============================================
const slides = [

    // SLIDE 0: Title
    () => (
        <Slide dark>
            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
                <span style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>February 2026 — Internal</span>
            </div>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', textAlign: 'center' }}>
                <Logo size={80} />
                <h1 style={{
                    marginTop: 32, fontSize: 56, fontWeight: 700, fontFamily: F.heading, letterSpacing: '-0.04em',
                    background: `linear-gradient(135deg, ${C.white} 0%, ${C.primary} 50%, ${C.secondary} 100%)`,
                    WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
                }}>Startup Engagement Models</h1>
                <p style={{ marginTop: 20, fontSize: 22, color: 'rgba(255,255,255,0.5)', fontWeight: 500 }}>
                    Venture Architecture Platform
                </p>
                <p style={{ marginTop: 16, fontSize: 15, color: 'rgba(255,255,255,0.3)', maxWidth: 600, lineHeight: 1.5 }}>
                    Four engagement types &bull; Two investment streams &bull; Studio → Fund roadmap
                </p>
                <p style={{ marginTop: 8, fontSize: 13, color: 'rgba(255,255,255,0.2)', fontStyle: 'italic' }}>
                    Not a VC fund. Not a broker. Not a consultancy. A venture architect, producer & capital structuring platform.
                </p>
                <div style={{
                    marginTop: 40, display: 'inline-flex', gap: 8, padding: '10px 24px',
                    borderRadius: 50, background: 'rgba(255,255,255,0.05)', border: `1px solid ${C.border}`
                }}>
                    <span style={{ fontSize: 13, color: C.primary }}>Creata Ventures Studio Ltd</span>
                    <span style={{ fontSize: 13, color: C.muted }}>&bull; AIFC, Astana</span>
                </div>
            </div>
        </Slide>
    ),

    // SLIDE 1: Current State
    () => (
        <Slide dark>
            <Logo size={48} />
            <SectionLabel number="01">Where We Are</SectionLabel>
            <SlideTitle size="large">Current Portfolio Snapshot</SlideTitle>
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20, alignContent: 'center' }}>
                <StatCard value="6+" label="Startups in Pipeline" icon={Rocket} highlight />
                <StatCard value="2" label="Investment Streams" icon={Layers} />
                <StatCard value="8" label="Team + Advisors" icon={Users} />
                <StatCard value="AIFC" label="Jurisdiction" icon={Building} highlight />
            </div>
            <p style={{ fontSize: 14, color: C.muted, textAlign: 'center', marginTop: 16 }}>
                DeepTech &bull; Creative Industries &bull; Central Asia → Global
            </p>
        </Slide>
    ),

    // SLIDE 2: The Problem
    () => (
        <Slide dark>
            <Logo size={48} />
            <SectionLabel number="01">The Challenge</SectionLabel>
            <SlideTitle size="large">One model doesn't fit all</SlideTitle>
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'center' }}>
                <div>
                    <p style={{ fontSize: 17, color: 'rgba(255,255,255,0.5)', marginBottom: 32, lineHeight: 1.7 }}>
                        We currently classify startups as either <span style={{ color: C.white, fontWeight: 600 }}>"Internal"</span> or <span style={{ color: C.white, fontWeight: 600 }}>"External"</span>. But our engagements vary dramatically:
                    </p>
                    {[
                        { emoji: '🔬', text: 'We fully build some products from zero' },
                        { emoji: '🤝', text: 'We co-build with domain expert founders' },
                        { emoji: '💰', text: 'We help some startups find investors' },
                        { emoji: '📈', text: 'We provide biz dev consulting to others' }
                    ].map((item, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20 }}>
                            <span style={{ fontSize: 28 }}>{item.emoji}</span>
                            <span style={{ fontSize: 17, color: 'rgba(255,255,255,0.75)', lineHeight: 1.5 }}>{item.text}</span>
                        </div>
                    ))}
                </div>
                <div style={{
                    background: `linear-gradient(135deg, ${C.accent}10, ${C.danger}10)`,
                    border: `1px solid ${C.accent}30`, borderRadius: 24, padding: 40, textAlign: 'center'
                }}>
                    <div style={{ fontSize: 64, fontWeight: 700, fontFamily: F.heading, color: C.accent }}>2 → 4</div>
                    <div style={{ fontSize: 16, color: C.muted, marginTop: 12, lineHeight: 1.6 }}>
                        From two categories<br/>to four distinct<br/>engagement models
                    </div>
                </div>
            </div>
        </Slide>
    ),

    // SLIDE 3: Four Types Overview
    () => (
        <Slide dark>
            <Logo size={48} />
            <SectionLabel number="02">Engagement Types</SectionLabel>
            <SlideTitle size="medium">Four models, one studio</SlideTitle>
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16, alignContent: 'start' }}>
                <TypeCard number="1" name="Creata Labs" tagline="We own it" equity="80-100%" color={C.primary}
                    effort={5} risk={5} returnLevel={5} cash={0}
                    items={['Studio-originated idea', 'Full build from zero', '2-3 FTE dedicated', 'Chair board seat']} />
                <TypeCard number="2" name="Co-Build" tagline="We build together" equity="40-60%" color={C.secondary}
                    effort={4} risk={4} returnLevel={4} cash={0}
                    items={['External founder + studio', '24-month AIFC sponsorship', '1-2 FTE allocated', '1 board seat']} />
                <TypeCard number="3" name="Capital Connect" tagline="We fund together" equity="7% fee + 7% warrants" color={C.accent}
                    effort={2} risk={2} returnLevel={3} cash={3}
                    items={['Deal sourcing & syndication', '7% success fee + 7% warrants', 'FPA signed before any intro', 'Board observer']} />
                <TypeCard number="4" name="Studio Advisory" tagline="We grow together" equity="0% + fees" color={C.success}
                    effort={3} risk={1} returnLevel={2} cash={4}
                    items={['Biz dev services', '$3-10K/mo retainer', 'Market entry support', 'Can convert to Type 2-3']} />
            </div>
        </Slide>
    ),

    // SLIDE 4: Type 1 Deep Dive
    () => (
        <Slide dark>
            <Logo size={48} />
            <SectionLabel number="02">Type 1</SectionLabel>
            <SlideTitle size="medium">Creata Labs — Internal Ventures</SlideTitle>
            <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 48, alignItems: 'start' }}>
                <div>
                    <p style={{ fontSize: 16, color: 'rgba(255,255,255,0.6)', marginBottom: 24, lineHeight: 1.7 }}>
                        We conceive, build, and own the startup from scratch. Full control, full risk, full upside.
                    </p>
                    <h3 style={{ fontSize: 16, fontWeight: 600, fontFamily: F.heading, color: C.primary, marginBottom: 16 }}>Equity Dilution Path</h3>
                    {[
                        { stage: 'Day 0', split: 'Creata 100%', color: C.primary },
                        { stage: '+ CEO recruited', split: 'Creata 70% / CEO 20% / ESOP 10%', color: C.white },
                        { stage: '+ Seed round', split: 'Creata 56% / CEO 16% / Investors 20%', color: C.white },
                        { stage: '+ Series A', split: 'Creata 42% / CEO 12% / All investors 40%', color: C.muted },
                    ].map((item, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                            <ArrowRight style={{ width: 16, height: 16, color: item.color, flexShrink: 0 }} />
                            <div>
                                <span style={{ fontSize: 12, color: C.muted }}>{item.stage}: </span>
                                <span style={{ fontSize: 14, color: item.color }}>{item.split}</span>
                            </div>
                        </div>
                    ))}
                </div>
                <div>
                    <h3 style={{ fontSize: 16, fontWeight: 600, fontFamily: F.heading, color: C.accent, marginBottom: 16 }}>Current Type 1 Portfolio</h3>
                    <DataTable compact
                        headers={['Startup', 'Stream', 'Stage']}
                        rows={[
                            ['iWendy', 'DeepTech', 'MVP Design'],
                        ]}
                    />
                    <div style={{
                        marginTop: 24, background: `${C.primary}10`, border: `1px solid ${C.primary}20`,
                        borderRadius: 12, padding: 16
                    }}>
                        <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)' }}>

                }}>Venture Architecture Platform</h1>
                <p style={{ marginTop: 8, fontSize: 16, color: 'rgba(255,255,255,0.35)' }}>One studio. Four models. Modular legal stack.</p>
                <div style={{ display: 'flex', gap: 32, marginTop: 40 }}>
                    {[
                        { n: '1', name: 'Labs', eq: '80-100%', c: C.primary },
                        { n: '2', name: 'Co-Build', eq: '40-60%', c: C.secondary },
                        { n: '3', name: 'Capital', eq: '7%+7%', c: C.accent },
                        { n: '4', name: 'Advisory', eq: 'Fees', c: C.success },
                    ].map((t, i) => (
                        <div key={i} style={{ textAlign: 'center' }}>
                            <div style={{ fontSize: 48, fontWeight: 700, fontFamily: F.heading, color: t.c, opacity: 0.6 }}>{t.n}</div>
                            <div style={{ fontSize: 16, fontWeight: 600, color: C.white, marginTop: 4 }}>{t.name}</div>
                            <div style={{ fontSize: 13, color: C.muted, marginTop: 4 }}>{t.eq}</div>
                        </div>
                    ))}
                </div>
                <div style={{ marginTop: 48, display: 'flex', alignItems: 'center', gap: 16 }}>
                    <span style={{ fontSize: 18, color: 'rgba(255,255,255,0.4)' }}>Venture Studio</span>
                    <ArrowRight style={{ width: 24, height: 24, color: C.primary }} />
                    <span style={{ fontSize: 18, color: 'rgba(255,255,255,0.4)' }}>Hybrid</span>
                    <ArrowRight style={{ width: 24, height: 24, color: C.primary }} />
                    <span style={{ fontSize: 18, color: C.primary, fontWeight: 600 }}>AIFC Venture Fund</span>
                </div>
                <p style={{ marginTop: 40, fontSize: 14, color: 'rgba(255,255,255,0.3)' }}>
                    Creata Ventures Studio Ltd &bull; AIFC, Astana &bull; david@creata.team &bull; www.creata.ventures
                </p>
            </div>
        </Slide>
    ),
];

// ============================================
// APP
// ============================================
const App = () => {
    const [current, setCurrent] = useState(0);
    const total = slides.length;

    useEffect(() => {
        const handleKey = (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault();
                setCurrent(c => Math.min(c + 1, total - 1));
            }
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                setCurrent(c => Math.max(c - 1, 0));
            }
            if (e.key === 'Home') setCurrent(0);
            if (e.key === 'End') setCurrent(total - 1);
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
    }, [total]);

    const CurrentSlide = slides[current];

    return (
        <div style={{ width: '100vw', height: '100vh', position: 'relative', background: C.dark }}>
            <CurrentSlide />

            {/* Progress bar */}
            <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, height: 3, background: 'rgba(255,255,255,0.1)' }}>
                <div style={{
                    height: '100%', background: `linear-gradient(90deg, ${C.primary}, ${C.accent})`,
                    width: `${((current + 1) / total) * 100}%`, transition: 'width 0.3s ease'
                }} />
            </div>

            {/* Slide counter */}
            <div style={{
                position: 'fixed', bottom: 12, right: 24,
                fontSize: 13, color: 'rgba(255,255,255,0.3)', fontFamily: F.body
            }}>
                {current + 1} / {total}
            </div>

            {/* Nav buttons */}
            {current > 0 && (
                <button onClick={() => setCurrent(c => c - 1)} style={{
                    position: 'fixed', left: 16, top: '50%', transform: 'translateY(-50%)',
                    width: 44, height: 44, borderRadius: '50%', background: 'rgba(255,255,255,0.05)',
                    border: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex',
                    alignItems: 'center', justifyContent: 'center'
                }}>
                    <ChevronLeft style={{ width: 20, height: 20, color: 'rgba(255,255,255,0.5)' }} />
                </button>
            )}
            {current < total - 1 && (
                <button onClick={() => setCurrent(c => c + 1)} style={{
                    position: 'fixed', right: 16, top: '50%', transform: 'translateY(-50%)',
                    width: 44, height: 44, borderRadius: '50%', background: 'rgba(255,255,255,0.05)',
                    border: `1px solid ${C.border}`, cursor: 'pointer', display: 'flex',
                    alignItems: 'center', justifyContent: 'center'
                }}>
                    <ChevronRight style={{ width: 20, height: 20, color: 'rgba(255,255,255,0.5)' }} />
                </button>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
