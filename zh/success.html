<!DOCTYPE html>

</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="../images/cv_logo_black.svg" alt="Creata Ventures" class="logo-img">
      </a>
      <nav class="nav">
        <ul class="nav-links">
          <li><a href="index.html" class="nav-link">首页</a></li>
          <li><a href="about.html" class="nav-link">关于我们</a></li>
          <li><a href="team.html" class="nav-link">团队</a></li>

          <li><a href="apply.html" class="nav-link">申请</a></li>
          <li><a href="contact.html" class="nav-link">联系我们</a></li>
        </ul>
        <div class="lang-switch">
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="ru">RU</button>
          <button class="lang-btn active" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="ar">عربي</button>

        <button class="menu-toggle" aria-label="切换菜单" aria-expanded="false">
          <span></span><span></span><span></span>

  <!-- Success Message -->
  <section class="section" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container text-center">
      <div style="font-size: 4rem; margin-bottom: var(--space-6);">✅</div>
      <h1 style="margin-bottom: var(--space-4);">申请已收到！</h1>
      <p style="font-size: var(--text-lg); color: var(--color-gray-600); max-width: 500px; margin: 0 auto var(--space-8);">
        感谢您对 Creata Ventures 的关注。我们已收到您的申请，将在5-7个工作日内进行审核。
      </p>
      <p style="color: var(--color-gray-500); margin-bottom: var(--space-8);">
        我们将通过您提供的电子邮箱与您联系。
      </p>
      <a href="index.html" class="btn btn-primary">返回首页</a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2025–2026 Creata Ventures Studio Ltd. 版权所有。</p>

    </div>

  <script src="../js/main.js"></script>
